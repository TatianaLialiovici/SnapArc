<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aura" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FCE9EF"/>
      <stop offset="38%" stop-color="#F4B2C4"/>
      <stop offset="72%" stop-color="#C4B2F0"/>
      <stop offset="100%" stop-color="#A8C4F4"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E88EB2"/>
      <stop offset="100%" stop-color="#A8C4F4"/>
    </linearGradient>
  </defs>
  <!-- Bespoke "aura aperture": a soft captured-light orb inside an open lens ring -->
  <circle cx="256" cy="256" r="120" fill="url(#aura)"/>
  <circle cx="218" cy="214" r="34" fill="#FFFFFF" opacity="0.55"/>
  <!-- open aperture ring, broken to feel hand-drawn / lens-like -->
  <path d="M256 84 a172 172 0 1 1 -121.6 50.4" stroke="url(#ring)" stroke-width="26" stroke-linecap="round" fill="none"/>
  <!-- light flares -->
  <path d="M256 40 V8" stroke="#E88EB2" stroke-width="20" stroke-linecap="round"/>
  <path d="M468 256 H500" stroke="#A8C4F4" stroke-width="20" stroke-linecap="round"/>
  <path d="M402 110 l22 -22" stroke="#C4B2F0" stroke-width="18" stroke-linecap="round"/>
</svg>
